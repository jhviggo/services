name: Deploying Detour Frontend
on:
  push:
    paths:
      - 'detour/**'
      - 'infrastructure/detour/**'
      - '.github/workflows/deploy-detour.yaml'

env:
  CONTAINER_REPO: registry.digitalocean.com/viggosdetour-production/services
  SRC: ./detour
  INFRA: ./infrastructure/detour

jobs:
  push-image:
    name: Build docker image and push to repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Lowercase branch name
        uses: ./.github/actions/env/
        with:
          branch: ${{ github.head_ref || github.ref_name }}

      - name: Build Docker image
        env:
          DOCKER_IMAGE: ${{ env.CONTAINER_REPO }}:detour-${{ env.BRANCH }}-${{ env.GITHUB_SHA_HASH }}
        run: |
          mv ${{ env.INFRA }}/* ${{ env.SRC }}/
          docker build -t $DOCKER_IMAGE ${{ env.SRC }}
          docker login registry.digitalocean.com -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push $DOCKER_IMAGE

  kubernetes-deploy:
    name: Deploy service to K3S
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Lowercase branch name
        uses: ./.github/actions/env/
        with:
          branch: ${{ github.head_ref || github.ref_name }}

      - uses: azure/setup-kubectl@v3
        id: install

      - name: Configure kubectl
        run: |
          mkdir $HOME/.kube/
          echo "${{ secrets.KUBE_CONFIG }}" >> $HOME/.kube/config
      
      - name: Deploy kubernetes definitions
        working-directory: ${{ env.INFRA }}
        env:
          BRANCH: ${{ env.BRANCH }}
          CONTAINER_REPO: ${{ env.CONTAINER_REPO }}
          GITHUB_SHA: ${{ env.GITHUB_SHA_HASH }}
        run: |
          envsubst < deploy-detour.yaml > def.yaml
          kubectl apply -f def.yaml
      
      - name: Wait for service to be ready
        run: |
          kubectl rollout status deployment/${{ env.BRANCH }}-detour --timeout=30s
          
      
      
