baseURL = "https://viggosdetour.com"
title = "Viggo's Detour Blog"
theme = "hugo-geekblog"

pluralizeListTitles = false
MetaDataFormat = "yaml"

# Geekblog required configuration
pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true

# Needed for mermaid shortcodes
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9

[taxonomies]
  tag = "tags"

[mediaTypes]
  [mediaTypes."application/atom+xml"]
    suffixes = ["xml"]

[outputFormats]
  [outputFormats.Atom]
    name = "Atom"
    mediaType = "application/atom+xml"
    baseName = "feed"
    isPlainText = false
    rel = "alternate"
    isHTML = false
    noUgly = true
    permalinkable = false

[outputs]
  home = ["HTML", "ATOM"]
  page = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML", "ATOM"]

[params]
  description = "Motorcycle trip from Denmark To Japan to begin my studies"
  subtitle = "Blog about my trip to Japan starting my Master's degree in Software Engineering"
  keywords = ["Travel", "Motorcycle", "Camping", "Software Engineer", "Viggo"]
  images = ["/images/denmark-field-bike-shot.jpg"]