<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
   
<div id="map"></div>

<script defer>
  /* ts-ignore next-line */
  const points = {{ $.Site.Data.map_markers }};

  setTimeout(() => {
    const tokyoCoords = [35.6786, 139.7637];
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    map.setView([45.7096757,17.1851883], 4);
    map.setMaxZoom(15).setMinZoom(3);

    // create lines between markers
    L.polyline(points.map(p => p.coords), {color: 'black', opacity: 1, className: 'no-click'}).addTo(map);
    L.polyline([points[points.length-1].coords, tokyoCoords], { color: 'black', dashArray: "15 10", opacity: 0.5}).addTo(map);

    // render markers
    for (const point of points) {
			const circleMarker = L.circleMarker(point.coords, {
				color: point.clickable ? 'var(--footer-link-color)' : 'black',
				fillColor: 'white',
				fillOpacity: 1,
				radius: 7,
				className: point.clickable ? 'point' : 'no-click'
			})
			.bindTooltip(point.hoverText)
			.addTo(map);

      if (point.clickable) {
				circleMarker.addEventListener('click', () => window.open(point.link, '_blank'));
			}
		}
    // draw Tokyo marker
    L.circleMarker(tokyoCoords, {
				color: 'black',
				fillColor: 'white',
				fillOpacity: 1,
				radius: 7,
				className: 'point'
			})
			.bindTooltip('Tokyo, Japan')
			.addTo(map);
  }, 100) // timeout to prevent map rendering before main layout
</script>

<style>
  #map {
    display: block;
    height: 60dvh;
    background-color: antiquewhite;
  }

  .no-click {
    cursor: unset;
  }
</style>
