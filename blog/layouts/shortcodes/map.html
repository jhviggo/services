<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
   
<div id="map"></div>

<script defer>
  /* ts-ignore next-line */
  const points = {{ $.Site.Data.map_markers }};
  const tracking = {{ $.Site.Data.map_markers_me }};

  setTimeout(() => {
    const tokyoCoords = [35.6786, 139.7637];
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    map.setView([45.7096757,17.1851883], 4);
    map.setMaxZoom(15).setMinZoom(3);

    
    // create lines between markers
    L.polyline(points.map(p => p.coords), {color: 'rgba(0, 0, 0, 0.35)', opacity: 1, className: 'no-click'}).addTo(map);
    L.polyline([points[points.length-1].coords, tokyoCoords], { color: 'rgba(0, 0, 0, 0.5)', dashArray: "15 10", opacity: 0.5}).addTo(map);

    
    L.polyline(tracking.map(p => p.coords), {color: 'rgba(70, 150, 90, 0.75)', opacity: 1, className: 'no-click'}).addTo(map);
    for (let i = 0; i < tracking.length; i++) {
      if (i == tracking.length - 1) {
        L.circleMarker(tracking[i].coords, {
            color: 'rgb(10, 83, 154)',
            fillColor: 'rgb(50, 153, 200)',
            fillOpacity: 1,
            radius: 7,
            className: 'no-click'
          })
          .bindTooltip(tracking[i].hoverText)
          .addTo(map);
      } else if (!tracking[i].hidden) {
        const circleMarker = L.circleMarker(tracking[i].coords, {
            color: tracking[i].clickable ? 'var(--footer-link-color)' : 'rgb(70, 150, 90)',
            fillColor: tracking[i].clickable ? 'var(--footer-link-color)' :'rgb(120, 200, 140)',
            fillOpacity: 1,
            radius: tracking[i].clickable ? 6 : 4,
            className: tracking[i].clickable ? 'point' : 'no-click'
          })
          .bindTooltip(tracking[i].hoverText)
          .addTo(map);

        if (tracking[i].clickable) {
				  circleMarker.addEventListener('click', () => window.open(tracking[i].link, '_blank'));
			  }
      }
    }
  }, 150) // timeout to prevent map rendering before main layout
</script>

<style>
  #map {
    display: block;
    height: 60dvh;
    background-color: antiquewhite;
  }

  .no-click {
    cursor: unset;
  }
</style>
