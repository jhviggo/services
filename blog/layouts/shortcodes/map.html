<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/scripts/leaflet.hotline.040.min.js"></script>

<div id="map"></div>

<script defer>
  /* ts-ignore next-line */
  const points = {{ $.Site.Data.map_markers }};
  const tracking = {{ $.Site.Data.map_markers_me }};

  setTimeout(() => {
    const tokyoCoords = [35.6786, 139.7637];
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    map.setView([45.7096757,17.1851883], 4);
    map.setMaxZoom(15).setMinZoom(3);

    
    // create lines between markers
    L.polyline(points.map(p => p.coords), {color: 'rgba(0, 0, 0, 0.35)', opacity: 1, className: 'no-click'}).addTo(map);
    L.polyline([points[points.length-1].coords, tokyoCoords], { color: 'rgba(0, 0, 0, 0.5)', dashArray: "15 10", opacity: 0.5}).addTo(map);
    
    const dataPoints = tracking.map((p, i) => p.coords.concat(i/tracking.length))
    const hotlineLayer = L.hotline(dataPoints, {
      min: 0,
      max: 1,
      outlineWidth: 0,
      // palette is set in the leaflet.hotline.040.min.js file, since there's a bug
      weight: 3
    }).addTo(map);

    
    console.log(dataPoints)
    console.log('this', hotlineLayer)

    for (let i = 0; i < tracking.length; i++) {
      if (!tracking[i].hidden) {
        L.circleMarker(tracking[i].coords, {
            color: `rgb(${hotlineLayer.getRGBForValue(i/tracking.length)})`,
            //fillColor: 'rgb(120, 200, 140)',
            fillOpacity: 1,
            radius: 4
          })
          .bindTooltip(tracking[i].hoverText)
          .addTo(map);
      }
    }
  }, 150) // timeout to prevent map rendering before main layout
</script>

<style>
  #map {
    display: block;
    height: 70dvh;
    background-color: antiquewhite;
  }

  .no-click {
    cursor: unset;
  }
</style>
