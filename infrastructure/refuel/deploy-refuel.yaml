apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BRANCH}-refuel
spec:
  selector:
    matchLabels:
      app: ${BRANCH}-refuel
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app: ${BRANCH}-refuel
    spec:
      containers:
        - name: ${BRANCH}-refuel
          image: ${CONTAINER_REPO}:refuel-${BRANCH}-${GITHUB_SHA}
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 3
            periodSeconds: 10
          ports:
            - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: ${BRANCH}-refuel
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: ${BRANCH}-refuel

---

kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ${BRANCH}-refuel
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: ${BRANCH}-refuel.services.viggosdetour.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${BRANCH}-refuel
            port:
              number: 80