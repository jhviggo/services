apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BRANCH}-service
spec:
  selector:
    matchLabels:
      app: ${BRANCH}-service
  replicas: 1
  template:
    metadata:
      labels:
        app: ${BRANCH}-service
    spec:
      containers:
        - name: ${BRANCH}-service
          image: ${CONTAINER_REPO}:backend-${BRANCH}-${GITHUB_SHA}
          readinessProbe:
            httpGet:
              path: /health
              port: 1337
            initialDelaySeconds: 15
            failureThreshold: 3
            periodSeconds: 10
          env:
            - name: DATABASE_NAME
              value: main
            - name: BRANCH
              value: ${BRANCH}
            - name: PORT
              value: "8080"
          ports:
            - containerPort: 1337

---

apiVersion: v1
kind: Service
metadata:
  name: ${BRANCH}-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 1337
  selector:
    app: ${BRANCH}-service

---

kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ${BRANCH}-service
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: ${BRANCH}-service.api.viggo.work
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${BRANCH}-service
            port:
              number: 80