apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BRANCH}-service
spec:
  selector:
    matchLabels:
      app: ${BRANCH}-service
  replicas: 1
  template:
    metadata:
      labels:
        app: ${BRANCH}-service
    spec:
      containers:
        - name: ${BRANCH}-service
          image: ${CONTAINER_REPO}:${BRANCH}-${GITHUB_SHA}
          #readinessProbe:
          #  httpGet:
          #    path: /health
          #    port: 80
          #  failureThreshold: 3
          #  periodSeconds: 10
          env:
            - name: DATABASE_SOURCE
              value: mysql
            - name: DATABASE_NAME
              value: main
            - name: DATABASE_USERNAME
              value: root
            - name: PORT
              value: "80"
            - name: GIN_MODE
              value: release
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          ports:
            - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: ${BRANCH}-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: ${BRANCH}-service

---

kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ${BRANCH}-service
spec:
  ingressClassName: nginx
  rules:
  - host: ${BRANCH}-service.api.viggo.work
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${BRANCH}-service
            port:
              number: 80